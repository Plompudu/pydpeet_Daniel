name: CI_Merge
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  #-------------#
  #--- BUILD ---#
  #-------------#
  build:
    runs-on: ubuntu-latest
    env:
      PYDPEET_DOC_VERSION: latest
    steps:
      - name: init
        uses: actions/checkout@v6
      - name: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: tk
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: uv_sync
        run: uv sync --frozen --group docs
      - name: docs
        run: uv run docs/build_docs.py
      - name: prepare_pages
        run: |
          mkdir -p docs/_public/latest
          cp -r docs/_build/html/* docs/_public/latest/

          cat > docs/_public/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=latest/">
          <a href="latest/">Go to latest documentation</a>
          EOF
      - name: pages_configure
        uses: actions/configure-pages@v5
      - name: pages_artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: docs-latest
          path: docs/_public/latest/
          retention-days: 14
  #--------------#
  #--- DEPLOY ---#
  #--------------#
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_latest.outputs.page_url }}
    steps:
      - name: pages_deploy_latest
        id: deployment_latest
        uses: actions/deploy-pages@v4
        with:
          artifact_name: docs-latest
