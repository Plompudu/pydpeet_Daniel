name: CI_Release_Docs

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v0.3.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  #-------------#
  #--- BUILD ---#
  #-------------#
  build:
    runs-on: ubuntu-latest
    env:
      PYDPEET_DOC_VERSION: ${{ inputs.tag || github.event.release.tag_name }}

    steps:
      - name: init
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - name: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: tk
        run: |
          sudo apt-get install -y python3-tk

      - name: uv_sync
        run: uv sync --frozen --group docs

      - name: docs
        run: uv run docs/build_docs.py

      - name: prepare_pages
        run: |
          VERSION="${{ inputs.tag || github.event.release.tag_name }}"

          mkdir -p public/$VERSION
          cp -r docs/_build/html/* public/$VERSION/

          if [ "${{ github.event_name }}" = "release" ]; then
              mkdir -p public/stable
              cp -r docs/_build/html/* public/stable/
          fi

      - name: create_switcher
        run: |
          mkdir -p public/_static

          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          base_url = "https://eet-tub.github.io/pydpeet"

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*", "--sort=-v:refname"],
              text=True,
          ).splitlines()

          switcher = [
              {
                  "name": "latest",
                  "version": "latest",
                  "url": f"{base_url}/latest/",
              },
              {
                  "name": "stable",
                  "version": "stable",
                  "url": f"{base_url}/stable/",
                  "preferred": True,
              },
          ]

          for tag in tags:
              switcher.append(
                  {
                      "name": tag,
                      "version": tag,
                      "url": f"{base_url}/{tag}/",
                  }
              )

          Path("public/_static/switcher.json").write_text(
              json.dumps(switcher, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: pages_deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          keep_files: true